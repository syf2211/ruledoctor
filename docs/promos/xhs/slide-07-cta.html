<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>XHS 07</title>
  <link rel="stylesheet" href="../v2/tokens.css" />
</head>
<body>
  <div class="frame frame--xhs">
    <div class="mesh"></div>
    <div class="xhs-main" style="justify-content:center;">
      <div class="cta-box">
        <div class="h3">GitHub 开源免费</div>
        <p>github.com/syf2211/ruledoctor</p>
        <p style="margin-top:20px;font-size:22px;">欢迎 Star · Issue · PR</p>
      </div>
      <div class="cmd" style="margin-top:46px;font-size:22px;line-height:1.55;text-align:center;">
        npx skills add syf2211/ruledoctor@ruledoctor -g -a codex -y
      </div>
      <div class="steps" style="margin-top:42px;">
        <div class="step-row">
          <div class="step-n">1</div>
          <div>
            <div class="step-t">装完新开对话</div>
            <div class="step-d">旧会话通常不会自动加载新 Skill</div>
          </div>
        </div>
        <div class="step-row">
          <div class="step-n">2</div>
          <div>
            <div class="step-t">在有规则的项目里试</div>
            <div class="step-d">CLAUDE.md / .cursorrules / AGENTS.md</div>
          </div>
        </div>
        <div class="step-row">
          <div class="step-n">3</div>
          <div>
            <div class="step-t">看它是否先读规则</div>
            <div class="step-d">默认只报文件列表 + 最多 3 条硬约束</div>
          </div>
        </div>
      </div>
    </div>
    <div class="xhs-foot"><span class="page-num">7 / 7</span><span class="chip">#AI编程 #ClaudeCode #Cursor</span></div>
  </div>
</body>
</html>
