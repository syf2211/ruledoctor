<!DOCTYPE html>

<head>

<body>
  <div class="frame frame--xhs">
    <div class="mesh"></div>

    <div class="xhs-main">

      <div class="steps">

        <div class="step-row"><div class="step-n">3</div><div><div class="step-t">揪出「假遵守」</div><div class="step-d">可选 CLI：对照会话与仓库，看有没有违规</div></div></div>
        <div class="step-row"><div class="step-n">4</div><div><div class="step-t">危险命令多一道门</div><div class="step-d">可选 Hook 拦截 force push 等</div></div></div>
      </div>
    </div>
    <div class="xhs-foot"><span class="page-num">4 / 7</span></div>
  </div>
