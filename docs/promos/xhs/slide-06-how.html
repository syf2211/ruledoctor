<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>XHS 06</title>
  <link rel="stylesheet" href="../v2/tokens.css" />
</head>
<body>
  <div class="frame frame--xhs">
    <div class="mesh"></div>
    <div class="xhs-top"><span class="badge"><span class="dot"></span>怎么用</span></div>
    <div class="xhs-main">
      <h2 class="h3">四步上手</h2>
      <div class="steps">
        <div class="step-row"><div class="step-n">1</div><div><div class="step-t">安装 Skill</div><div class="step-d">一条 npx 命令，或 CC Switch 添加仓库</div></div></div>
        <div class="step-row"><div class="step-n">2</div><div><div class="step-t">新开一场对话</div><div class="step-d">在有 CLAUDE.md 的项目里试一个小需求</div></div></div>
        <div class="step-row"><div class="step-n">3</div><div><div class="step-t">看助手是否先读规则</div><div class="step-d">应先说读了哪些文件 + 几条硬规矩</div></div></div>
        <div class="step-row"><div class="step-n">4</div><div><div class="step-t">（可选）跑检测 / 看报告</div><div class="step-d">想较真时再开 CLI 或 Hook</div></div></div>
      </div>
      <div class="cmd" style="font-size:22px;margin-top:32px;padding:20px;">npx skills add syf2211/ruledoctor@ruledoctor -g -y</div>
    </div>
    <div class="xhs-foot"><span class="page-num">6 / 7</span></div>
  </div>
</body>
</html>
