<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>封面</title>
<link rel="stylesheet" href="styles.css">
<style>
  .glow1{width:520px;height:520px;background:#5E5CE6;top:-160px;right:-120px;}
  .glow2{width:460px;height:460px;background:#FF2D55;bottom:-120px;left:-140px;opacity:.32;}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:54px;position:relative;z-index:2;}
  .titleblock{position:relative;z-index:2;margin-bottom:46px;}
  .titleblock .sub{margin-top:30px;}
  .rules{position:relative;z-index:2;margin-bottom:40px;}
  .hookbar{position:relative;z-index:2;}
</style>
</head>
<body>
<div class="canvas">
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="head">
    <span class="tag"><span class="dot"></span>AI 编程避坑 · Cursor / Claude Code</span>
    <span class="pill">规则体检</span>
  </div>

  <div class="titleblock">
    <div class="h-mega">你写的规则<br><span class="em">AI 没在听</span></div>
    <div class="lead sub">不报错 · 不提醒 · 静默失效<br>你以为 AI 变蠢了,其实规则根本没生效。</div>
  </div>

  <div class="rules">
    <div class="ruleline">
      <span class="lamp g"></span>
      <span class="txt">金额用整数「分」<small>✓ 读到了,也照做了</small></span>
      <span class="pct" style="color:var(--green)">遵守</span>
    </div>
    <div class="ruleline">
      <span class="lamp y"></span>
      <span class="txt">提交前跑 lint<small>△ 读到了,但没执行</small></span>
      <span class="pct" style="color:var(--yellow)">漏了</span>
    </div>
    <div class="ruleline">
      <span class="lamp r"></span>
      <span class="txt">日期用 YYYY-MM-DD<small>✗ 压根没加载进上下文</small></span>
      <span class="pct" style="color:var(--red)">失效</span>
    </div>
  </div>

  <div class="hookbar">
    <div class="num">37%</div>
    <div class="lbl">实测的开源项目里<br>规则,模型根本没读到</div>
  </div>

  <div class="foot">
    <div class="brand">
      <div class="logo">R</div>
      <div>
        <div class="name">RuleDoctor</div>
        <div class="sub">给 AI 编程规则,做「覆盖率检测」</div>
      </div>
    </div>
    <span class="pill">↑ 开源 · 左滑看怎么救</span>
  </div>
</div>
</body>
</html>
