<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>RuleDoctor — 安装即用</title>
  <link rel="stylesheet" href="tokens.css" />
</head>
<body>
  <div class="frame frame--og">
    <div class="mesh"></div>
    <div class="grid-bg"></div>
    <div class="row-banner">
      <div class="col" style="padding: 40px 48px;">
        <span class="chip chip--accent">一条命令安装</span>
        <h1 class="h1 h1--banner mt" style="font-size:42px;">让 Agent <span class="hl">更听你的规则</span></h1>
        <p class="lead" style="font-size:20px;">不是再写更长 prompt，而是让助手<strong style="color:#fff">先读</strong> CLAUDE.md / .cursorrules，并在关键操作前自检。</p>
        <div class="cmd" style="font-size:12px;margin-top:24px;">npx skills add syf2211/ruledoctor@ruledoctor -g -a codex -y</div>
      </div>
      <div class="col col--right" style="padding: 32px;">
        <div class="stack gap-sm">
          <span class="chip">✓ 先读规则再动手</span>
          <span class="chip">✓ 压缩上下文后提醒重读</span>
          <span class="chip">✓ 发现「嘴上答应、代码没照做」</span>
          <span class="chip">✓ 危险命令可硬拦截（可选）</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
